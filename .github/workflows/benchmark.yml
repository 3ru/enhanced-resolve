name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: benchmark-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  main:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run benchmark
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p benchmark-results
          node --expose-gc benchmark/unsafe-cache-normalization.js \
            --samples 5 \
            --warmup-samples 1 \
            --importers 800 \
            --nested-packages 4 \
            --nested-importers 120 > benchmark-results/main.json
      - name: Format summary
        run: |
          node benchmark/format-results.js \
            --current benchmark-results/main.json \
            --current-label main > benchmark-results/summary.md
          cat benchmark-results/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-main-${{ github.sha }}
          path: benchmark-results

  pull-request:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head
        uses: actions/checkout@v4
        with:
          path: head
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          path: base
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: |
            base/package-lock.json
            head/package-lock.json
      - name: Install dependencies
        run: |
          npm ci --prefix base
          npm ci --prefix head
      - name: Run benchmarks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p benchmark-results
          node --expose-gc base/benchmark/unsafe-cache-normalization.js \
            --samples 5 \
            --warmup-samples 1 \
            --importers 800 \
            --nested-packages 4 \
            --nested-importers 120 > benchmark-results/base.json
          node --expose-gc head/benchmark/unsafe-cache-normalization.js \
            --samples 5 \
            --warmup-samples 1 \
            --importers 800 \
            --nested-packages 4 \
            --nested-importers 120 > benchmark-results/head.json
      - name: Format comparison
        run: |
          node head/benchmark/format-results.js \
            --base benchmark-results/base.json \
            --base-label "${{ github.event.pull_request.base.ref }}" \
            --current benchmark-results/head.json \
            --current-label "${{ github.event.pull_request.head.ref }}" > benchmark-results/comment.md
          cat benchmark-results/comment.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          path: benchmark-results
      - name: Comment on PR
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("benchmark-results/comment.md", "utf8");
            const marker = "<!-- enhanced-resolve-unsafe-cache-benchmark -->";
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === "Bot" && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
